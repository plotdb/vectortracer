<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VectorTracer WASM Test</title>
  <style>
    *, box-sizing: border-box;
    body { font-family: sans-serif; max-width: 1400px; margin: 30px auto; padding: 0 16px; }
    h2 { margin-bottom: 16px; }

    /* top bar */
    #topbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    #topbar button { padding: 7px 18px; cursor: pointer; border: none; border-radius: 4px; background: #1976d2; color: #fff; font-size: 0.95em; }
    #topbar button:disabled { background: #aaa; cursor: default; }

    /* param grid */
    .params { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px 16px; margin-bottom: 14px; background: #f7f8fa; border: 1px solid #dde; border-radius: 6px; padding: 12px 16px; }
    .param { display: flex; flex-direction: column; gap: 2px; }
    .param label { font-size: 0.82em; color: #555; font-weight: 600; }
    .param-row { display: flex; align-items: center; gap: 6px; }
    .param-row input[type=range] { flex: 1; min-width: 0; }
    .param-row .val { font-size: 0.85em; color: #333; min-width: 32px; text-align: right; }
    .param select, .param input[type=color], .param input[type=checkbox] { font-size: 0.9em; }
    .param input[type=number] { width: 70px; font-size: 0.9em; padding: 2px 4px; border: 1px solid #ccc; border-radius: 3px; }
    .section-title { grid-column: 1 / -1; font-size: 0.75em; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: .06em; margin-top: 4px; border-top: 1px solid #dde; padding-top: 8px; }
    .section-title:first-child { border-top: none; margin-top: 0; padding-top: 0; }
    .color-only { }

    #progress-bar { width: 100%; background: #eee; border-radius: 4px; height: 10px; margin-bottom: 10px; display: none; }
    #progress-fill { height: 100%; background: #4caf50; border-radius: 4px; width: 0%; transition: width 0.15s; }
    #status { font-size: 0.85em; color: #555; margin-bottom: 12px; }

    .panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .panel { border: 1px solid #ddd; border-radius: 6px; padding: 10px; }
    .panel h3 { margin: 0 0 8px; font-size: 0.9em; color: #333; }
    img { max-width: 100%; height: auto; display: block; }
    .svg-wrap { max-width: 100%; overflow: auto; }
    .svg-wrap svg { max-width: 100%; height: auto; display: block; }
    textarea { width: 100%; height: 80px; font-size: 10px; box-sizing: border-box; margin-top: 8px; }
    #topbar button.secondary { background: #455a64; }
  </style>
</head>
<body>
  <h2>VectorTracer WASM Test</h2>

  <div id="topbar">
    <input type="file" id="file-input" accept="image/*">
    <button id="run-btn" disabled>Convert</button>
    <button id="opt-btn" disabled>Optimize (SSIM)</button>
    <button id="download-btn" class="secondary" disabled>Download SVG</button>
    <button id="download-merged-btn" class="secondary" disabled>Download Merged</button>
  </div>

  <div class="params">
    <div class="section-title">Image &amp; Mode</div>

    <div class="param">
      <label>Color Mode</label>
      <select id="colormode">
        <option value="color">color</option>
        <option value="bw">bw</option>
      </select>
    </div>

    <div class="param">
      <label>Path Mode</label>
      <select id="mode">
        <option value="spline">spline</option>
        <option value="polygon">polygon</option>
        <option value="none">none (pixel)</option>
      </select>
    </div>

    <div class="param">
      <label>Filter Speckle (px)</label>
      <div class="param-row">
        <input type="range" id="filterSpeckle" min="0" max="32" value="4">
        <span class="val" id="filterSpeckleVal">4</span>
      </div>
    </div>

    <div class="param">
      <label>Path Precision (decimals)</label>
      <div class="param-row">
        <input type="range" id="pathPrecision" min="1" max="10" value="8">
        <span class="val" id="pathPrecisionVal">8</span>
      </div>
    </div>

    <div class="param">
      <label>Scale</label>
      <div class="param-row">
        <input type="range" id="scale" min="0.1" max="4" step="0.1" value="1">
        <span class="val" id="scaleVal">1</span>
      </div>
    </div>

    <div class="section-title">Path Simplification</div>

    <div class="param">
      <label>Corner Threshold (deg)</label>
      <div class="param-row">
        <input type="range" id="cornerThreshold" min="0" max="180" value="60">
        <span class="val" id="cornerThresholdVal">60</span>
      </div>
    </div>

    <div class="param">
      <label>Length Threshold</label>
      <div class="param-row">
        <input type="range" id="lengthThreshold" min="0" max="10" step="0.5" value="4">
        <span class="val" id="lengthThresholdVal">4</span>
      </div>
    </div>

    <div class="param">
      <label>Max Iterations</label>
      <div class="param-row">
        <input type="range" id="maxIterations" min="1" max="20" value="10">
        <span class="val" id="maxIterationsVal">10</span>
      </div>
    </div>

    <div class="param">
      <label>Splice Threshold (deg)</label>
      <div class="param-row">
        <input type="range" id="spliceThreshold" min="0" max="180" value="45">
        <span class="val" id="spliceThresholdVal">45</span>
      </div>
    </div>

    <div class="section-title color-only">Color Clustering</div>

    <div class="param color-only">
      <label>Color Precision (1=few, 8=many)</label>
      <div class="param-row">
        <input type="range" id="colorPrecision" min="1" max="8" value="6">
        <span class="val" id="colorPrecisionVal">6</span>
      </div>
    </div>

    <div class="param color-only">
      <label>Layer Difference</label>
      <div class="param-row">
        <input type="range" id="layerDifference" min="0" max="64" value="16">
        <span class="val" id="layerDifferenceVal">16</span>
      </div>
    </div>

    <div class="section-title color-only">Color Reduction (post-process)</div>

    <div class="param color-only">
      <label>Max Colors (0 = off)</label>
      <div class="param-row">
        <input type="range" id="maxColors" min="0" max="32" value="0">
        <span class="val" id="maxColorsVal">off</span>
      </div>
    </div>

    <div class="param color-only">
      <label>Merge Threshold (RGB dist)</label>
      <div class="param-row">
        <input type="range" id="colorMergeThreshold" min="0" max="50" value="17">
        <span class="val" id="colorMergeThresholdVal">17</span>
      </div>
    </div>

    <div class="section-title">Options</div>

    <div class="param" id="invert-param">
      <label>Invert (BW only)</label>
      <label style="display:flex;align-items:center;gap:6px;font-size:0.9em;">
        <input type="checkbox" id="invert"> invert dark/light
      </label>
    </div>

    <div class="param">
      <label>Background Color</label>
      <div class="param-row">
        <input type="color" id="backgroundColor" value="#ffffff">
        <label style="font-size:0.85em;"><input type="checkbox" id="bgTransparent"> none</label>
      </div>
    </div>

    <div class="param">
      <label>Path Fill Override</label>
      <div class="param-row">
        <input type="color" id="pathFill" value="#000000">
        <label style="font-size:0.85em;"><input type="checkbox" id="pathFillAuto" checked> auto</label>
      </div>
    </div>
  </div>

  <div id="progress-bar"><div id="progress-fill"></div></div>
  <div id="status">Loading WASM...</div>

  <div class="panels">
    <div class="panel">
      <h3>Original</h3>
      <img id="preview" src="apple.png" alt="preview">
    </div>
    <div class="panel">
      <h3>SVG Output</h3>
      <div class="svg-wrap" id="svg-container"></div>
      <textarea id="svg-source" placeholder="SVG source will appear here..." readonly></textarea>
    </div>
    <div class="panel">
      <h3>Merged SVG</h3>
      <div class="svg-wrap" id="svg-merged-container"></div>
      <textarea id="svg-merged-source" placeholder="Merged SVG source will appear here..." readonly></textarea>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.18/paper-full.min.js"></script>
  <script type="module">
    import { trace, optimize } from '/assets/lib/@plotdb/vectortracer/main/api.js';
    import { mergePaths } from '/assets/lib/@plotdb/vectortracer/main/svg-proc.js';

    const $ = id => document.getElementById(id);
    const statusEl = $('status');
    const runBtn = $('run-btn');
    const optBtn = $('opt-btn');
    const downloadBtn = $('download-btn');
    const downloadMergedBtn = $('download-merged-btn');

    let lastSvg = null;
    let lastMergedSvg = null;

    function makeDl(svg, suffix) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
      a.download = (currentBlob?.name ?? 'output').replace(/\.[^.]+$/, '') + suffix + '.svg';
      a.click();
      URL.revokeObjectURL(a.href);
    }
    downloadBtn.addEventListener('click', () => { if (lastSvg) makeDl(lastSvg, ''); });
    downloadMergedBtn.addEventListener('click', () => { if (lastMergedSvg) makeDl(lastMergedSvg, '-merged'); });

    // Shared trace logic
    async function doTrace() {
      if (!currentBlob) return;
      runBtn.disabled = true;
      optBtn.disabled = true;
      downloadBtn.disabled = true;
      downloadMergedBtn.disabled = true;
      $('svg-container').innerHTML = '';
      $('svg-source').value = '';
      $('svg-merged-container').innerHTML = '';
      $('svg-merged-source').value = '';
      $('progress-bar').style.display = 'block';
      $('progress-fill').style.width = '30%';
      statusEl.textContent = 'Converting...';

      try {
        const svg = await trace(currentBlob, getConfigs());
        $('svg-container').innerHTML = svg;
        $('svg-source').value = svg;
        lastSvg = svg;
        downloadBtn.disabled = false;

        $('progress-fill').style.width = '60%';
        statusEl.textContent = 'Merging paths...';

        const mergedSvg = await mergePaths(svg);
        $('svg-merged-container').innerHTML = mergedSvg;
        $('svg-merged-source').value = mergedSvg;
        lastMergedSvg = mergedSvg;
        downloadMergedBtn.disabled = false;

        $('progress-fill').style.width = '100%';
        statusEl.textContent = `Done. SVG: ${svg.length} chars / Merged: ${mergedSvg.length} chars`;
      } catch (err) {
        statusEl.textContent = `Error: ${err}`;
      } finally {
        runBtn.disabled = false;
        optBtn.disabled = false;
      }
    }

    // Wire up all sliders to show their value
    const sliders = ['filterSpeckle','pathPrecision','scale','cornerThreshold',
                     'lengthThreshold','maxIterations','spliceThreshold',
                     'colorPrecision','layerDifference','colorMergeThreshold'];
    sliders.forEach(id => {
      const el = $(id), val = $(id + 'Val');
      el.addEventListener('input', () => { val.textContent = el.value; });
    });

    // maxColors: 0 means off → show "off", else show value
    $('maxColors').addEventListener('input', () => {
      const v = parseInt($('maxColors').value);
      $('maxColorsVal').textContent = v === 0 ? 'off' : v;
    });

    // Show/hide color-only params
    const colormodeSelect = $('colormode');
    function updateColorOnlyVisibility() {
      const isColor = colormodeSelect.value === 'color';
      document.querySelectorAll('.color-only').forEach(el => {
        el.style.display = isColor ? '' : 'none';
      });
      $('invert-param').style.display = isColor ? 'none' : '';
    }
    colormodeSelect.addEventListener('change', updateColorOnlyVisibility);
    updateColorOnlyVisibility();

    // pathFill auto toggle
    $('pathFillAuto').addEventListener('change', e => {
      $('pathFill').disabled = e.target.checked;
    });
    $('pathFill').disabled = true;

    function getConfigs() {
      const isColor = colormodeSelect.value === 'color';
      const bgTransparent = $('bgTransparent').checked;
      const pathFillAuto = $('pathFillAuto').checked;
      return {
          colorMode: $('colormode').value,
          mode: $('mode').value,
          filterSpeckle: parseInt($('filterSpeckle').value),
          cornerThreshold: parseFloat($('cornerThreshold').value),
          lengthThreshold: parseFloat($('lengthThreshold').value),
          maxIterations: parseInt($('maxIterations').value),
          spliceThreshold: parseFloat($('spliceThreshold').value),
          pathPrecision: parseInt($('pathPrecision').value),
          colorPrecision: parseInt($('colorPrecision').value),
          layerDifference: parseInt($('layerDifference').value),
          invert: $('invert').checked,
          backgroundColor: bgTransparent ? 'none' : $('backgroundColor').value,
          pathFill: pathFillAuto ? undefined : $('pathFill').value,
          scale: parseFloat($('scale').value),
          maxColors: parseInt($('maxColors').value) || undefined,
          colorMergeThreshold: parseInt($('colorMergeThreshold').value),
      };
    }

    function setConfigs(cfg) {
      if (cfg.colorMode !== undefined) $('colormode').value = cfg.colorMode;
      if (cfg.mode !== undefined) $('mode').value = cfg.mode;
      if (cfg.filterSpeckle !== undefined) { $('filterSpeckle').value = cfg.filterSpeckle; $('filterSpeckleVal').textContent = cfg.filterSpeckle; }
      if (cfg.cornerThreshold !== undefined) { $('cornerThreshold').value = cfg.cornerThreshold; $('cornerThresholdVal').textContent = cfg.cornerThreshold; }
      if (cfg.lengthThreshold !== undefined) { $('lengthThreshold').value = cfg.lengthThreshold; $('lengthThresholdVal').textContent = cfg.lengthThreshold; }
      if (cfg.maxIterations !== undefined) { $('maxIterations').value = cfg.maxIterations; $('maxIterationsVal').textContent = cfg.maxIterations; }
      if (cfg.spliceThreshold !== undefined) { $('spliceThreshold').value = cfg.spliceThreshold; $('spliceThresholdVal').textContent = cfg.spliceThreshold; }
      if (cfg.pathPrecision !== undefined) { $('pathPrecision').value = cfg.pathPrecision; $('pathPrecisionVal').textContent = cfg.pathPrecision; }
      if (cfg.colorPrecision !== undefined) { $('colorPrecision').value = cfg.colorPrecision; $('colorPrecisionVal').textContent = cfg.colorPrecision; }
      if (cfg.layerDifference !== undefined) { $('layerDifference').value = cfg.layerDifference; $('layerDifferenceVal').textContent = cfg.layerDifference; }
      if (cfg.maxColors !== undefined) { $('maxColors').value = cfg.maxColors; $('maxColorsVal').textContent = cfg.maxColors; }
      if (cfg.colorMergeThreshold !== undefined) { $('colorMergeThreshold').value = cfg.colorMergeThreshold; $('colorMergeThresholdVal').textContent = cfg.colorMergeThreshold; }
      if (cfg.invert !== undefined) $('invert').checked = cfg.invert;
      updateColorOnlyVisibility();
    }

    // warm up WASM on load
    trace(await fetch('apple.png').then(r => r.blob()), { colorMode: 'bw' })
      .then(() => {
        statusEl.textContent = 'WASM ready. Click Convert to trace apple.png, or choose another image.';
        runBtn.disabled = false;
        optBtn.disabled = false;
      });

    let currentBlob = await fetch('apple.png').then(r => r.blob());

    $('file-input').addEventListener('change', async e => {
      const file = e.target.files[0];
      if (!file) return;
      $('preview').src = URL.createObjectURL(file);
      currentBlob = file;
      statusEl.textContent = `Loaded: ${file.name}`;
    });

    runBtn.addEventListener('click', () => doTrace());

    optBtn.addEventListener('click', async () => {
      if (!currentBlob) return;
      runBtn.disabled = true;
      optBtn.disabled = true;
      $('progress-bar').style.display = 'block';
      $('progress-fill').style.width = '0%';
      statusEl.textContent = 'Optimizing...';

      try {
        const bestConfig = await optimize(currentBlob, getConfigs(), ({ progress, currentConfig, bestScore }) => {
          $('progress-fill').style.width = `${progress * 100}%`;
          statusEl.textContent = `Optimizing... Best SSIM: ${bestScore.toFixed(4)}`;
          setConfigs(currentConfig);
        });
        setConfigs(bestConfig);
        statusEl.textContent = 'Optimization done. Running final trace...';
        await doTrace();
      } catch (err) {
        statusEl.textContent = `Error: ${err}`;
        runBtn.disabled = false;
        optBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
