<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VectorTracer WASM Test</title>
  <style>
    body { font-family: sans-serif; max-width: 1200px; margin: 30px auto; padding: 0 16px; }
    #topbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; flex-wrap: wrap; }
    button { padding: 7px 18px; cursor: pointer; border: none; border-radius: 4px; background: #1976d2; color: #fff; font-size: 0.95em; }
    button:disabled { background: #aaa; cursor: default; }
    button.secondary { background: #455a64; }
    #status { font-size: 0.85em; color: #555; margin-bottom: 12px; }
    .panels { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; }
    .panel { border: 1px solid #ddd; border-radius: 6px; padding: 10px; }
    .panel h3 { margin: 0 0 8px; font-size: 0.9em; color: #333; }
    img { max-width: 100%; height: auto; display: block; }
    .svg-wrap { max-width: 100%; overflow: auto; }
    .svg-wrap svg { max-width: 100%; height: auto; display: block; }
    textarea { width: 100%; height: 80px; font-size: 10px; box-sizing: border-box; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>VectorTracer WASM Test</h2>

  <div id="topbar">
    <input type="file" id="file-input" accept="image/*">
    <button id="run-btn" disabled>Convert</button>
    <button id="download-btn" class="secondary" disabled>Download SVG</button>
    <button id="download-merged-btn" class="secondary" disabled>Download Merged</button>
  </div>

  <div id="status">Loading WASM...</div>

  <div class="panels">
    <div class="panel">
      <h3>Original</h3>
      <img id="preview" src="apple.png" alt="preview">
    </div>
    <div class="panel">
      <h3>SVG Output</h3>
      <div class="svg-wrap" id="svg-container"></div>
      <textarea id="svg-source" placeholder="SVG source..." readonly></textarea>
    </div>
    <div class="panel">
      <h3>Merged SVG</h3>
      <div class="svg-wrap" id="svg-merged-container"></div>
      <textarea id="svg-merged-source" placeholder="Merged SVG source..." readonly></textarea>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/paper.js/0.12.18/paper-full.min.js"></script>
  <script src="/assets/lib/@plotdb/vectortracer/main/index.bundle.js"></script>
  <script>
    const status = document.getElementById('status');
    const runBtn = document.getElementById('run-btn');
    const downloadBtn = document.getElementById('download-btn');
    const downloadMergedBtn = document.getElementById('download-merged-btn');

    let currentBlob = null;
    let lc = {};

    const cfg = { maxColors: 9, filterSpeckle: 9 };

    fetch('apple.png').then(r => r.blob()).then(async blob => {
      currentBlob = blob;
      await vectortracer.trace(blob, cfg);
      status.textContent = 'WASM ready. Click Convert to trace apple.png, or choose another image.';
      runBtn.disabled = false;
    });

    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('preview').src = URL.createObjectURL(file);
      currentBlob = file;
      status.textContent = `Loaded: ${file.name}`;
    });

    function makeDl(svg, suffix) {
      const a = document.createElement('a');
      a.href = URL.createObjectURL(new Blob([svg], { type: 'image/svg+xml' }));
      a.download = (currentBlob?.name ?? 'output').replace(/\.[^.]+$/, '') + suffix + '.svg';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    downloadBtn.addEventListener('click', () => { if (lc.svg) makeDl(lc.svg, ''); });
    downloadMergedBtn.addEventListener('click', () => { if (lc.mergedSvg) makeDl(lc.mergedSvg, '-merged'); });

    runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      downloadBtn.disabled = true;
      downloadMergedBtn.disabled = true;
      document.getElementById('svg-container').innerHTML = '';
      document.getElementById('svg-merged-container').innerHTML = '';
      status.textContent = 'Converting...';
      try {
        const [svg, mergedSvg] = await Promise.all([
          vectortracer.trace(currentBlob, cfg),
          vectortracer.trace(currentBlob, { ...cfg, mergePaths: true }),
        ]);
        document.getElementById('svg-container').innerHTML = svg;
        document.getElementById('svg-source').value = svg;
        document.getElementById('svg-merged-container').innerHTML = mergedSvg;
        document.getElementById('svg-merged-source').value = mergedSvg;
        status.textContent = `Done. SVG: ${svg.length} chars / Merged: ${mergedSvg.length} chars`;
        lc.svg = svg;
        lc.mergedSvg = mergedSvg;
        downloadBtn.disabled = false;
        downloadMergedBtn.disabled = false;
      } catch (err) {
        status.textContent = `Error: ${err}`;
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
