<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VectorTracer WASM Test</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 30px auto; padding: 0 16px; }
    #topbar { display: flex; gap: 10px; align-items: center; margin-bottom: 14px; }
    button { padding: 7px 18px; cursor: pointer; border: none; border-radius: 4px; background: #1976d2; color: #fff; font-size: 0.95em; }
    button:disabled { background: #aaa; cursor: default; }
    #status { font-size: 0.85em; color: #555; margin-bottom: 12px; }
    .panels { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .panel { border: 1px solid #ddd; border-radius: 6px; padding: 10px; }
    .panel h3 { margin: 0 0 8px; font-size: 0.9em; color: #333; }
    img { max-width: 100%; height: auto; display: block; }
    #svg-container svg { max-width: 100%; height: auto; display: block; }
    textarea { width: 100%; height: 100px; font-size: 10px; box-sizing: border-box; margin-top: 8px; }
  </style>
</head>
<body>
  <h2>VectorTracer WASM Test</h2>

  <div id="topbar">
    <input type="file" id="file-input" accept="image/*">
    <button id="run-btn" disabled>Convert</button>
  </div>

  <div id="status">Loading WASM...</div>

  <div class="panels">
    <div class="panel">
      <h3>Original</h3>
      <img id="preview" src="apple.png" alt="preview">
    </div>
    <div class="panel">
      <h3>SVG Output</h3>
      <div id="svg-container"></div>
    </div>
  </div>

  <textarea id="svg-source" placeholder="SVG source will appear here..." readonly></textarea>

  <script src="./pkg/vectortracer.bundle.js"></script>
  <script>
    const status = document.getElementById('status');
    const runBtn = document.getElementById('run-btn');

    let currentBlob = null;

    fetch('apple.png').then(r => r.blob()).then(async blob => {
      currentBlob = blob;
      // warm up WASM
      await vectortracer.trace(blob);
      status.textContent = 'WASM ready. Click Convert to trace apple.png, or choose another image.';
      runBtn.disabled = false;
    });

    document.getElementById('file-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      document.getElementById('preview').src = URL.createObjectURL(file);
      currentBlob = file;
      status.textContent = `Loaded: ${file.name}`;
    });

    runBtn.addEventListener('click', async () => {
      runBtn.disabled = true;
      status.textContent = 'Converting...';
      try {
        const svg = await vectortracer.trace(currentBlob);
        document.getElementById('svg-container').innerHTML = svg;
        document.getElementById('svg-source').value = svg;
        status.textContent = `Done. SVG: ${svg.length} chars`;
      } catch (err) {
        status.textContent = `Error: ${err}`;
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
